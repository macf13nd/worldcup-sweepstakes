name: Refresh dashboard

on:
  schedule:
    # 06:23 UTC (~07:23 BST). Off the top-of-hour to dodge GitHub's congested
    # scheduler queue (on-the-hour crons get delayed/dropped under load). Runs
    # after overnight US fixtures wrap and before a typical morning check.
    - cron: "23 6 * * *"
  workflow_dispatch: {}    # manual "refresh now" button

permissions:
  contents: write          # commit the regenerated page back to main

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Build dashboard
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python build.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html data/standings.json
          if ! git diff --cached --quiet; then
            git commit -m "Refresh dashboard ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          else
            echo "No changes."
          fi
